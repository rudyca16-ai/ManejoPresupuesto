trigger:
- main

pool:
  name: Selfhosted

variables:
  solution: 'ManejoPresupuesto/ManejoPresupuesto.sln'
  proyectoMVC: 'ManejoPresupuesto/ManejoPresupuesto.csproj'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
- task: NuGetToolInstaller@1

- task: NuGetCommand@2
  inputs:
    restoreSolution: '$(solution)'

# Compila toda la solución (incluye el proyecto DB)
- task: VSBuild@1
  displayName: 'Compilar solución (incluye DB)'
  inputs:
    solution: '$(solution)'
    configuration: '$(buildConfiguration)'
    msbuildArgs: '/p:DSP=Microsoft.Data.Tools.Schema.Sql.SqlAzureV12DatabaseSchemaProvider'

# Copia los dacpac generados por el proyecto DB
- task: CopyFiles@2
  displayName: 'Copiar artefacto DB (.dacpac)'
  inputs:
    Contents: '**/*.dacpac'
    flattenFolders: true
    TargetFolder: '$(Build.ArtifactStagingDirectory)/db'

# Publica el proyecto MVC
- task: DotNetCoreCLI@2
  displayName: 'Publicando proyecto MVC'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: $(proyectoMVC)
    arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)/webapp --runtime win-x86 --self-contained'
    zipAfterPublish: false
    modifyOutputPath: false

# Publica ambos artefactos
- task: PublishBuildArtifacts@1
  displayName: 'Publicando artefactos'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'